  <body class="bg-[#0d0d1a]">
    <div id="root">
      <!-- Fallback Loading UI: Previne tela branca enquanto o bundle carrega -->
      <div id="fj-initial-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-center;background:#0d0d1a;color:white;font-family:sans-serif;z-index:9999;">
        <div style="width:60px;height:60px;border:4px solid rgba(16,185,129,0.1);border-top-color:#10b981;border-radius:50%;animation:fj-spin 1s linear infinite;"></div>
        <p style="margin-top:20px;font-weight:500;letter-spacing:0.05em;opacity:0.8;">Iniciando FitJourney...</p>
        <button id="fj-recovery-btn" style="display:none;margin-top:30px;padding:10px 20px;background:#10b981;color:black;border:none;border-radius:8px;font-weight:bold;cursor:pointer;box-shadow:0 0 20px rgba(16,185,129,0.4);">Recarregar Sistema</button>
      </div>
      <style>
        @keyframes fj-spin { to { transform: rotate(360deg); } }
        .fade-out { opacity: 0; transition: opacity 0.5s ease-out; pointer-events: none; }
      </style>
      <script>
        // --- EMERGENCY PWA RECOVERY SYSTEM ---
        (function() {
          var BUILD_VERSION = "%BUILD_VERSION%";
          var lastVersion = localStorage.getItem('fj_last_version');
          
          // Se a versão mudou, podemos estar em um estado de transição de SW.
          if (lastVersion && lastVersion !== BUILD_VERSION) {
            console.warn("[FitJourney:PWA] Versão detectada mudou: " + lastVersion + " -> " + BUILD_VERSION);
            // Se detectarmos que acabamos de atualizar, damos um tempo para o SW respirar
          }
          localStorage.setItem('fj_last_version', BUILD_VERSION);

          // Watchdog: Se o app não montar em 15s, força limpeza e reload.
          var watchdog = setTimeout(function() {

          window.__FJ_MARK_READY__ = function() {
            window.__FJ_READY__ = true;
            clearTimeout(watchdog);
            var loader = document.getElementById('fj-initial-loader');
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(function() { loader.remove(); }, 500);
            }
          };
        })();

        // Version logger for debugging
        console.log("System Version: %BUILD_VERSION%");
        console.log("Built at: %BUILD_TIMESTAMP%");
      </script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
