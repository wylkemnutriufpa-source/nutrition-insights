name: Schema Integrity Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install

      - name: Verify Schema Snapshot
        id: verify
        run: pnpm run schema:verify
        continue-on-error: true

      - name: Run Determinism Test
        run: node scripts/test-determinism.mjs

      - name: Upload Schema Diff Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-diff-artifact
          path: schema.diff
          if-no-files-found: ignore

      - name: Check Verification Status
        if: steps.verify.outcome == 'failure'
        run: |
          echo "Schema verification failed. Please check the 'schema-diff-artifact' for details."
          exit 1
